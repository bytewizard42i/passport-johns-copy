name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'assets/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Stage Pages artefact
        run: |
          set -euo pipefail
          mkdir -p _site/site
          cp -r site/. _site/site/
          cp -r assets _site/assets
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <title>Midnight Passport</title>
          <meta http-equiv="refresh" content="0; url=site/">
          <link rel="canonical" href="site/">
          <p>Redirecting to <a href="site/">Midnight Passport</a>…</p>
          HTML

          # Inject deploy metadata (last-commit date · short SHA · link to
          # commit) into each live page's footer. The <!--DEPLOY-->…
          # <!--/DEPLOY--> markers in the HTML files are the substitution
          # anchors; if this step is skipped, the markers stay invisible
          # and the static fallback inside them remains visible.
          LAST_COMMIT_DATE="$(git log -1 --format=%cd --date=format:%Y/%m/%d)"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          COMMIT_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
          DEPLOY_META="Updated ${LAST_COMMIT_DATE}<br>commit <a href=\"${COMMIT_URL}\">${SHORT_SHA}</a>"
          for f in _site/site/index.html _site/site/demo.html _site/site/standards.html; do
            sed -i "s|<!--DEPLOY-->.*<!--/DEPLOY-->|${DEPLOY_META}|" "$f"
          done

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artefact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
