name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'assets/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Stage Pages artefact
        run: |
          set -euo pipefail
          mkdir -p _site/site
          cp -r site/. _site/site/
          cp -r assets _site/assets
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <title>Midnight Passport</title>
          <meta http-equiv="refresh" content="0; url=site/">
          <link rel="canonical" href="site/">
          <p>Redirecting to <a href="site/">Midnight Passport</a>…</p>
          HTML

          # Inject deploy metadata (short SHA · timestamp · link to commit)
          # into the landing page footer. The <!-- DEPLOY_META --> comment in
          # site/index.html is the substitution anchor; if this step fails or
          # is skipped, the comment stays invisible and nothing breaks.
          SHORT_SHA="${GITHUB_SHA:0:7}"
          DEPLOY_TS="$(date -u '+%Y-%m-%d %H:%M UTC')"
          COMMIT_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
          DEPLOY_META="Deployed ${DEPLOY_TS} · commit <a href=\"${COMMIT_URL}\">${SHORT_SHA}</a>"
          sed -i "s|<!-- DEPLOY_META -->|${DEPLOY_META}|" _site/site/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artefact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
